package: modeldiag

title: "modeldiag"

url: https://teniola17.github.io/modeldiag/

destination: docs

template:
  bootstrap: 5

navbar:
  structure:
    left: [home, reference, articles, news]

reference:
  - title: Main diagnostic workflow
    contents:
      - diagnose_model
  - title: Linear model checks
    contents:
      - check_vif
      - check_heteroskedasticity
      - check_autocorrelation
      - check_linearity
      - check_normality
      - check_outliers
  - title: Logistic regression checks
    contents:
      - check_box_tidwell
      - check_hosmer_lemeshow
      - check_influential_glm
      - check_separation
  - title: Poisson regression checks
    contents:
      - check_overdispersion
      - check_zero_inflation
      - check_residual_analysis
  - title: Survival model checks
    contents:
      - check_proportional_hazards
      - check_influential_coxph
      - check_functional_form_coxph
  - title: Output helpers
    contents:
      - print.model_diagnostics
      - summary.model_diagnostics
      - plot.model_diagnostics

news:
  include: NEWS.md
